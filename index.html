        inlineMath: [['$', '$'], ['\\(', '\\)']],

        fontCache: 'global'
      }
    };
    </script>

    <style>

#### Poin Penting:
* **Domain** adalah himpunan semua nilai $x$ yang membuat fungsi terdefinisi.
* **Kodomain** adalah himpunan daerah kawan.
* **Range** adalah himpunan semua nilai $y$ yang dihasilkan dari fungsi $f(x)$.

Misalkan kita memiliki fungsi akar:
$$f(x) = \\sqrt{x - 2}$$

Maka, syarat agar fungsi terdefinisi adalah bagian dalam akar harus bernilai positif atau nol:
$$x - 2 \\ge 0$$
$$x \\ge 2$$

Jadi, Domain dari fungsi tersebut adalah $D_f = \\{x | x \\ge 2, x \\in \\mathbb{R}\\}$.

        // Fungsi Induk untuk Menggambar Seluruh Halaman
        function render() {
            const currentUnitData = kurikulum.find(u => u.id === state.activeUnit);
            
            // Generate Silabus Sidebar
            const silabusHtml = kurikulum.map(unit => {
                const isActiveUnit = state.activeUnit === unit.id;
                let topicsHtml = '';
                
                if (isActiveUnit) {
                    topicsHtml = `<div class="mt-1.5 ml-3 border-l-2 border-slate-100 pl-3">` + 
                        unit.topics.map(topic => {
                            const isActiveTopic = state.activeTopic.id === topic.id;
                            const iconName = topic.type === 'video' ? 'play-circle' : 'check-circle';
                            
                            // Pewarnaan yang lebih halus
                            let iconColor = 'text-slate-400';
                            if (isActiveTopic) iconColor = 'text-blue-600';
                            else if (topic.type === 'quiz') iconColor = 'text-blue-400';

                            const activeClass = isActiveTopic 
                                ? 'bg-blue-50 text-blue-700 font-semibold shadow-sm' 
                                : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900';
                            
                            return `
                                <button onclick="setActiveTopic('${unit.id}', '${topic.id}')" class="w-full text-left text-sm py-2 px-3 rounded-xl flex items-center space-x-2.5 my-1 transition-all ${activeClass}">
                                    <i data-lucide="${iconName}" class="w-4 h-4 shrink-0 ${iconColor}"></i>
                                    <span class="truncate tracking-wide">${topic.title}</span>
                                </button>`;
                        }).join('') + `</div>`;
                }

                return `
                    <div class="mb-3">
                        <button onclick="toggleUnit('${unit.id}')" class="w-full text-left font-bold text-sm p-3 rounded-xl hover:bg-slate-100 flex justify-between items-center transition-colors ${isActiveUnit ? 'text-blue-700 bg-blue-50/50' : 'text-slate-700'}">
                            <span>${unit.title}</span>
                        </button>
                        ${topicsHtml}
                    </div>`;
            }).join('');

            // Tentukan Judul Header
            let headerTitle = '';
            if (state.activeTab === 'learn') headerTitle = currentUnitData.title;
            else if (state.activeTab === 'practice') headerTitle = 'Pusat Latihan Soal';
            else if (state.activeTab === 'news') headerTitle = 'Portal Pengumuman';
            else headerTitle = 'Tentang Halaman Ini';

            // Gabungkan Struktur Utama
            document.getElementById('app').innerHTML = `
                <div class="flex h-screen w-full print:block print:h-auto">
                    
                    <!-- Sidebar -->
                    <div class="bg-white w-[300px] border-r border-slate-200 flex flex-col transition-transform duration-300 ${state.isSidebarOpen ? 'translate-x-0' : '-translate-x-full absolute z-20 h-full shadow-2xl md:relative md:shadow-none'} print:hidden">
                        <div class="p-6 border-b border-slate-100 flex justify-between items-center text-blue-700">
                            <div class="flex items-center space-x-3">
                                <i data-lucide="book-open" class="w-7 h-7"></i>
                                <h1 class="text-2xl font-display font-bold tracking-tight">ClickMath</h1>
                            </div>
                            <button class="md:hidden p-1.5 rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-700" onclick="toggleSidebar()">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto pb-8">
                            <!-- Navigasi Utama -->
                            <div class="p-5 border-b border-slate-100">
                                <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Menu Utama</h2>
                                <nav class="space-y-1.5">
                                    <button onclick="setActiveTab('learn')" class="w-full flex items-center space-x-3 px-3.5 py-2.5 rounded-xl text-sm font-semibold transition-all ${state.activeTab === 'learn' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}">
                                        <i data-lucide="book-open" class="w-[18px] h-[18px]"></i>
                                        <span>Materi Belajar</span>
                                    </button>
                                    <button onclick="setActiveTab('practice')" class="w-full flex items-center space-x-3 px-3.5 py-2.5 rounded-xl text-sm font-semibold transition-all ${state.activeTab === 'practice' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}">
                                        <i data-lucide="pen-tool" class="w-[18px] h-[18px]"></i>
                                        <span>Latihan Soal</span>
                                    </button>
                                    <button onclick="setActiveTab('news')" class="w-full flex items-center space-x-3 px-3.5 py-2.5 rounded-xl text-sm font-semibold transition-all ${state.activeTab === 'news' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}">
                                        <i data-lucide="newspaper" class="w-[18px] h-[18px]"></i>
                                        <span>News / Updates</span>
                                    </button>
                                    <button onclick="setActiveTab('about')" class="w-full flex items-center space-x-3 px-3.5 py-2.5 rounded-xl text-sm font-semibold transition-all ${state.activeTab === 'about' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}">
                                        <i data-lucide="user" class="w-[18px] h-[18px]"></i>
                                        <span>About Me</span>
                                    </button>
                                </nav>
                            </div>

                            <!-- Silabus -->
                            <div class="p-5 ${state.activeTab !== 'learn' ? 'opacity-40 pointer-events-none grayscale' : ''}">
                                <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-4">Silabus Prekalkulus</h2>
                                ${silabusHtml}
                            </div>
                        </div>
                    </div>

                    <!-- Main Content -->
                    <div class="flex-1 flex flex-col h-full overflow-hidden w-full relative print:block print:h-auto print:overflow-visible bg-slate-50/50">
                        <!-- Header -->
                        <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center shadow-sm print:hidden">
                            <button class="mr-4 text-slate-500 hover:text-blue-600 transition-colors md:hidden" onclick="toggleSidebar()">
                                <i data-lucide="menu"></i>
                            </button>
                            <h2 class="text-lg font-display font-bold text-slate-800">${headerTitle}</h2>
                        </header>
                        
                        <!-- Area Konten Dinamis -->
                        <main class="flex-1 overflow-y-auto p-4 md:p-10 print:block print:overflow-visible print:p-0 print:bg-white">
                            ${state.activeTab === 'learn' ? renderLearningView(currentUnitData) : ''}
                            ${state.activeTab === 'practice' ? renderPracticeView() : ''}
                            ${state.activeTab === 'news' ? renderNewsView() : ''}
                            ${state.activeTab === 'about' ? renderAboutView() : ''}
                        </main>
                    </div>

                </div>
            `;

            // Wajib dipanggil untuk mengaktifkan ikon Lucide setelah elemen HTML digambar ulang
            lucide.createIcons();
        }

        // --- 5. JALANKAN APLIKASI PERTAMA KALI ---
        render();

    </script>
