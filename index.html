                ]

        // --- 2. STATE (Kondisi Aplikasi) ---
        let state = {
            activeTab: 'learn', // 'learn', 'practice', 'news', 'about'
            activeUnit: kurikulum[0].id,
            activeTopic: kurikulum[0].topics[0],
            isSidebarOpen: true
        };

        // --- 3. FUNGSI LOGIKA (Mengubah State) ---
        function setActiveTab(tab) {
            state.activeTab = tab;
            render();
        }

        function toggleUnit(unitId) {
            state.activeUnit = unitId;
            state.activeTab = 'learn';
            render();
        }

        function setActiveTopic(unitId, topicId) {
            state.activeUnit = unitId;
            const unit = kurikulum.find(u => u.id === unitId);
            state.activeTopic = unit.topics.find(t => t.id === topicId);
            state.activeTab = 'learn';
            // Menutup sidebar otomatis jika di layar kecil
            if (window.innerWidth < 768) {
                state.isSidebarOpen = false;
            }
            render();
        }

        function toggleSidebar() {
            state.isSidebarOpen = !state.isSidebarOpen;
            render();
        }

        // --- 4. FUNGSI TAMPILAN (Render ke HTML) ---

        // Fungsi Induk untuk Menggambar Seluruh Halaman
        function render() {
            const currentUnitData = kurikulum.find(u => u.id === state.activeUnit);
            
            // Generate Silabus Sidebar
            const silabusHtml = kurikulum.map(unit => {
                const isActiveUnit = state.activeUnit === unit.id;
                let topicsHtml = '';
                
                if (isActiveUnit) {
                    topicsHtml = `<div class="mt-1 ml-2 border-l-2 border-gray-100 pl-2">` + 
                        unit.topics.map(topic => {
                            const isActiveTopic = state.activeTopic.id === topic.id;
                            const iconName = topic.type === 'video' ? 'play-circle' : 'check-circle';
                            const iconColor = topic.type === 'video' ? 'text-gray-400' : 'text-purple-500';
                            const activeClass = isActiveTopic ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-600 hover:bg-gray-100';
                            
                            return `
                                <button onclick="setActiveTopic('${unit.id}', '${topic.id}')" class="w-full text-left text-sm py-2 px-3 rounded-md flex items-center space-x-2 my-1 ${activeClass}">
                                    <i data-lucide="${iconName}" class="w-4 h-4 shrink-0 ${iconColor}"></i>
                                    <span class="truncate">${topic.title}</span>
                                </button>`;
                        }).join('') + `</div>`;
                }

                return `
                    <div class="mb-4">
                        <button onclick="toggleUnit('${unit.id}')" class="w-full text-left font-medium text-sm p-2 rounded-md hover:bg-gray-100 flex justify-between items-center ${isActiveUnit ? 'text-blue-600 bg-blue-50' : 'text-gray-700'}">
                            <span>${unit.title}</span>
                        </button>
                        ${topicsHtml}
                    </div>`;
            }).join('');

            // Tentukan Judul Header
            let headerTitle = '';
            if (state.activeTab === 'learn') headerTitle = currentUnitData.title;
            else if (state.activeTab === 'practice') headerTitle = 'Pusat Latihan Soal';
            else if (state.activeTab === 'news') headerTitle = 'Portal Pengumuman';
            else headerTitle = 'Tentang Halaman Ini';

            // Gabungkan Struktur Utama
            document.getElementById('app').innerHTML = `
                <div class="flex h-screen w-full">
                    
                    <!-- Sidebar -->
                    <div class="bg-white w-72 border-r border-gray-200 flex flex-col transition-transform duration-300 ${state.isSidebarOpen ? 'translate-x-0' : '-translate-x-full absolute z-20 h-full shadow-lg md:relative md:shadow-none'}">
                        <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-blue-600 text-white">
                            <div class="flex items-center space-x-2">
                                <i data-lucide="book-open"></i>
                                <h1 class="text-xl font-bold">ClickMath</h1>
                            </div>
                            <button class="md:hidden p-1 rounded hover:bg-blue-700" onclick="toggleSidebar()">
                                <i data-lucide="x"></i>
                            </button>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto">
                            <!-- Navigasi Utama -->
                            <div class="p-4 border-b border-gray-100">
                                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Menu Utama</h2>
                                <nav class="space-y-1">
                                    <button onclick="setActiveTab('learn')" class="w-full flex items-center space-x-3 px-3 py-2 rounded-md text-sm font-medium transition-colors ${state.activeTab === 'learn' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}">
                                        <i data-lucide="book-open" class="w-[18px] h-[18px]"></i>
                                        <span>Materi Belajar</span>
                                    </button>
                                    <button onclick="setActiveTab('practice')" class="w-full flex items-center space-x-3 px-3 py-2 rounded-md text-sm font-medium transition-colors ${state.activeTab === 'practice' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}">
                                        <i data-lucide="pen-tool" class="w-[18px] h-[18px]"></i>
                                        <span>Latihan Soal</span>
                                    </button>
                                    <button onclick="setActiveTab('news')" class="w-full flex items-center space-x-3 px-3 py-2 rounded-md text-sm font-medium transition-colors ${state.activeTab === 'news' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}">
                                        <i data-lucide="newspaper" class="w-[18px] h-[18px]"></i>
                                        <span>News / Updates</span>
                                    </button>
                                    <button onclick="setActiveTab('about')" class="w-full flex items-center space-x-3 px-3 py-2 rounded-md text-sm font-medium transition-colors ${state.activeTab === 'about' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}">
                                        <i data-lucide="user" class="w-[18px] h-[18px]"></i>
                                        <span>About Me</span>
                                    </button>
                                </nav>
                            </div>

                            <!-- Silabus -->
                            <div class="p-4 ${state.activeTab !== 'learn' ? 'opacity-50 pointer-events-none' : ''}">
                                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4">Silabus Prekalkulus</h2>
                                ${silabusHtml}
                            </div>
                        </div>
                    </div>

                    <!-- Main Content -->
                    <div class="flex-1 flex flex-col h-full overflow-hidden w-full relative">
                        <!-- Header -->
                        <header class="bg-white border-b border-gray-200 p-4 flex items-center">
                            <button class="mr-4 text-gray-500 hover:text-gray-700 md:hidden" onclick="toggleSidebar()">
                                <i data-lucide="menu"></i>
                            </button>
                            <h2 class="text-lg font-semibold text-gray-800">${headerTitle}</h2>
                        </header>
                        
                        <!-- Area Konten Dinamis -->
                        <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-gray-50">
                            ${state.activeTab === 'learn' ? renderLearningView() : ''}
                            ${state.activeTab === 'practice' ? renderPracticeView() : ''}
                            ${state.activeTab === 'news' ? renderNewsView() : ''}
                            ${state.activeTab === 'about' ? renderAboutView() : ''}
                        </main>
                    </div>

                </div>
            `;

            // Wajib dipanggil untuk mengaktifkan ikon Lucide setelah elemen HTML digambar ulang
            lucide.createIcons();
        }

        // --- 5. JALANKAN APLIKASI PERTAMA KALI ---
        render();

    </script>
</body>
</html>
